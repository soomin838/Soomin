timezone: Asia/Seoul
schedule:
  interval_hours: 4
  jitter_minutes: 30
  max_retry_backoff_minutes: 30
  min_interval_hours: 1.0
  max_interval_hours: 4.5
windows:
  use_task_scheduler: true
budget:
  free_mode: false
  dry_run: false
  daily_post_limit: 6
  daily_gemini_call_limit: 50
publish:
  use_blogger_schedule: true
  min_delay_minutes: 10
  max_delay_minutes: 45
  queue_horizon_hours: 72
  target_queue_size: 18
  random_min_gap_floor_minutes: 45
  random_min_gap_ceiling_minutes: 150
  daily_publish_cap: 5
  image_hosting_backend: blogger_media
  mobile_duplicate_block_enabled: true
quality:
  enabled: true
  strict_mode: true
  min_quality_score: 91
  qa_retry_max_passes: 0
  min_word_count: 900
  min_h2: 3
  min_h3: 2
  min_list_items: 6
  min_external_links: 2
  min_authority_links: 2
  banned_markers:
  - delve
  - comprehensive
  - cutting-edge
  - in conclusion
  llm_judge_enabled: false
  llm_judge_min_score: 70
topic_growth:
  enabled: true
  daily_new_topics: 10
  min_seed_score: 75
sources:
  mode: mixed
  seeds_path: storage/seeds/seeds.json
  stackexchange_site: stackoverflow
  stackexchange_tagged: artificial-intelligence;productivity;automation;chatgpt
  stackexchange_min_score: 5
  hn_min_score: 40
  github_repos:
  - microsoft/playwright
  - psf/requests
  github_min_reactions: 2
  github_token: ''
  max_candidates: 20
gemini:
  api_key: GEMINI_API_KEY
  model: gemini-2.0-flash
  min_publish_score: 70
  editor_persona: You are a native English tech influencer writing for US/UK/global
    office workers. Your tone is human, clear, practical, and experience-driven.
  max_calls_per_day: 50
  max_calls_per_run: 4
  min_request_interval_seconds: 30
  fallback_models:
  - gemini-2.0-flash
  - gemini-2.5-flash-lite
  - gemini-2.5-flash
visual:
  target_images_per_post: 5
  enable_gemini_image_generation: true
  gemini_prompt_model: gemini-2.0-flash
  gemini_image_model: models/imagen-3.0-generate-001
  screenshot_priority_keywords:
  - dashboard
  - settings
  - ui
  - screen
  - github
  - documentation
  - api
  - pricing
  - install
  - menu
  allow_chart_fallback: false
  image_request_interval_seconds: 20
  image_provider: pollinations
  pollinations_enabled: true
  pollinations_thumbnail_model: gptimage
  pollinations_content_model: flux
  thumbnail_ocr_verify: false
  pollinations_api_key: ""
blogger:
  blog_id: '3798794568809192736'
  credentials_path: config/blogger_token.json
indexing:
  enabled: true
  service_account_path: config/service_account.json
  daily_quota: 200
authority_links:
- https://developers.google.com/search/docs/fundamentals/creating-helpful-content
- https://api.stackexchange.com/docs
- https://github.com/HackerNews/API
- https://docs.github.com/en/rest
- https://docs.python.org/3/
integrations:
  enabled: true
  adsense_enabled: true
  analytics_enabled: true
  search_console_enabled: true
  ga4_property_id: '525161210'
  search_console_site_url: https://goundrich.blogspot.com/
  refresh_minutes: 3
keyword_pool:
  enabled: true
  daily_target: 100
  refill_threshold: 20
  active_pool_max: 250
  pick_per_run: 5
  retry_per_run_when_under_target: 0
runtime:
  policy_migration_version: 1
